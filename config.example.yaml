# ============================================================================
# Tool Groups Configuration
# ============================================================================
# Define groups of tools for organization and access control

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# Tools Configuration
# ============================================================================
# Configure available tools for the agent to use

tools:
  # Web search tool (requires Tavily API key)
  - name: web_search
    group: web
    use: src.community.tavily.tools:web_search_tool
    max_results: 5
    # api_key: $TAVILY_API_KEY  # Set if needed

  # Web search tool (uses custom search backend)
  # Keep the same tool name `web_search` and switch the provider by changing `use`.
  # - name: web_search
  #   group: web
  #   use: src.community.custom_search.tools:web_search_tool
  #   api_url: $CUSTOM_SEARCH_API_URL
  #   api_key: $CUSTOM_SEARCH_API_KEY
  #   timeout: 30
  #   max_results: 5
  #   # Optional: override the default repository defined in `custom_search`
  #   # default_repository: dynamic_search

  # Online search tool (fixed to the online-search repository in the custom backend)
  # - name: online_search
  #   group: web
  #   use: src.community.online_search.tools:online_search_tool
  #   timeout: 30
  #   max_results: 10

  # Vector search tool (uses the dedicated structured knowledge backend)
  # - name: vector_search
  #   group: web
  #   use: src.community.vector_search.tools:vector_search_tool
  #   timeout: 30
  #   api_url: $VECTOR_SEARCH_API_URL
  #   # Optional request payload overrides
  #   # user_code: "147852"
  #   # search_type: "0"
  #   # vector_top_n: 10
  #   # spaceCodeList: ["SP0000082"]
  #   # caller: "P2025094"
  #   # customized_tag_list: ["s1"]

  # Web search tool (requires InfoQuest API key)
  # - name: web_search
  #   group: web
  #   use: src.community.infoquest.tools:web_search_tool
  #   # Used to limit the scope of search results, only returns content within the specified time range. Set to -1 to disable time filtering
  #   search_time_range: 10

  # Web fetch tool (uses Jina AI reader)
  - name: web_fetch
    group: web
    use: src.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # Web fetch tool (uses InfoQuest AI reader)
  # - name: web_fetch
  #   group: web
  #   use: src.community.infoquest.tools:web_fetch_tool
  #   # Overall timeout for the entire crawling process (in seconds). Set to positive value to enable, -1 to disable
  #   timeout: 10
  #   # Waiting time after page loading (in seconds). Set to positive value to enable, -1 to disable
  #   fetch_time: 10
  #   # Timeout for navigating to the page (in seconds). Set to positive value to enable, -1 to disable
  #   navigation_timeout: 30

  # Image search tool (uses DuckDuckGo)
  # Use this to find reference images before image generation
  - name: image_search
    group: web
    use: src.community.image_search.tools:image_search_tool
    max_results: 5

  # File operations tools
  - name: ls
    group: file:read
    use: src.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: src.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: src.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: src.sandbox.tools:str_replace_tool

  # Bash execution tool
  - name: bash
    group: bash
    use: src.sandbox.tools:bash_tool

