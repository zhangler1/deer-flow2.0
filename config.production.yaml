# ============================================================================
# 生产环境特定配置
# ============================================================================

# 日志级别
logging:
  level: INFO
  format: json  # 方便日志聚合工具解析

# 性能监控
monitoring:
  enabled: true
  prometheus_port: 9090

# 限流配置
rate_limiting:
  enabled: true
  default_rate: "10/minute"  # 每分钟 10 次
  burst_size: 20

# 安全配置
security:
  enable_cors: true
  allowed_origins:
    - "https://your-domain.com"
    - "https://www.your-domain.com"
  
  # API 密钥验证 (可选)
  require_api_key: false
  api_keys:
    - $API_KEY_1
    - $API_KEY_2
